<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langwieser IT-Services</title>
    <meta name="description" content="Ein-Mann-Unternehmen für Entwicklung in Nintex K2, MS Power Platform und SQL.">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="style.css">
    <!-- Nerdy font -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Business Card -->
    <main class="card">
        <!-- Language Switch -->
        <div class="lang-switch">
            <button onclick="setLang('de')" id="btn-de" class="active">DE</button>
            <button onclick="setLang('en')" id="btn-en">EN</button>
        </div>

        <div class="profile-pic-container">
            <div class="profile-pic-placeholder">
                <img src="profile.jpg" alt="Langwieser IT-Services Profile" class="profile-pic">
            </div>
        </div>

        <div class="card-content">
            <h1 class="name">&lt;Langwieser<br>IT-Services /&gt;</h1>

            <div class="terminal-box">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="terminal-body">
                    <p class="desc" data-lang="de">
                        <span class="prompt">~ $</span> whoami<br>
                        Ein-Mann-Unternehmen spezialisiert auf:<br>
                        <span class="highlight">- Nintex K2</span><br>
                        <span class="highlight">- MS Power Platform</span><br>
                        <span class="highlight">- SQL</span>
                    </p>
                    <p class="desc" data-lang="en" style="display: none;">
                        <span class="prompt">~ $</span> whoami<br>
                        One-man company doing development work in:<br>
                        <span class="highlight">- Nintex K2</span><br>
                        <span class="highlight">- MS Power Platform</span><br>
                        <span class="highlight">- SQL</span>
                    </p>
                </div>
            </div>

            <div class="actions">
                <button class="btn primary-btn" onclick="openModal()">
                    <span data-lang="de">Kontakt aufnehmen</span>
                    <span data-lang="en" style="display: none;">Get in touch</span>
                </button>
            </div>

            <div class="footer-links">
                <a href="impress.html">
                    <span data-lang="de">Impressum</span>
                    <span data-lang="en" style="display: none;">Imprint</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-lang="de">Nachricht senden</h2>
                <h2 data-lang="en" style="display: none;">Send message</h2>
                <button class="close-btn" onclick="closeModal()" aria-label="Close">&times;</button>
            </div>
            <form action="https://formspree.io/f/mykkgezk" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="email" data-lang="de">Ihre E-Mail</label>
                    <label for="email" data-lang="en" style="display: none;">Your Email</label>
                    <input type="email" id="email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="message" data-lang="de">Ihre Nachricht</label>
                    <label for="message" data-lang="en" style="display: none;">Your Message</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn submit-btn">
                    <span data-lang="de">Senden <span class="arrow">&rarr;</span></span>
                    <span data-lang="en" style="display: none;">Send <span class="arrow">&rarr;</span></span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.querySelectorAll('[data-lang]').forEach(el => {
                if (el.dataset.lang === lang) {
                    el.style.display = '';
                } else {
                    el.style.display = 'none';
                }
            });
            document.getElementById('btn-de').classList.toggle('active', lang === 'de');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.documentElement.lang = lang;
            localStorage.setItem('langPref', lang);
        }

        function openModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.remove('open');
            modal.setAttribute('aria-hidden', 'true');
        }

        // Initialize with saved preference or default to German
        const savedLang = localStorage.getItem('langPref') || 'de';
        setLang(savedLang);

        // Close modal on escape key or clicking backdrop
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>

</html>
